<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsHub - My Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Content Security Policy (CSP) for Development -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
        img-src 'self' data: https: http: *;
        connect-src 'self' http://localhost:5000 http://127.0.0.1:5000 ws://localhost:5500 ws://127.0.0.1:5500 http://127.0.0.1:5500;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        frame-ancestors 'none';
    ">
</head>

<body class="profile-body">
    <!-- Navbar -->
    <nav class="navbar sticky" id="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="/" data-link><i class="fas fa-newspaper"></i> NewsHub</a>
            </div>
            <ul class="nav-menu">
                <li><a href="/" data-link>Home</a></li>
            </ul>
        </div>
    </nav>

    <main class="profile-page">
        <header class="profile-header">
            <div class="avatar-large" id="profile-initial">U</div>
            <div class="profile-info">
                <h1 id="profile-name">Loading...</h1>
                <p id="profile-email">@loading</p>
            </div>
        </header>

        <div class="profile-tabs">
            <div class="tab-btn active" data-tab="account">Account Settings</div>
            <div class="tab-btn" data-tab="saved">Saved News History</div>
        </div>

        <section id="account-tab" class="profile-content">
            <div class="profile-grid">
                <div class="form-card">
                    <h2>Edit Profile</h2>
                    <form id="edit-profile-form">
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" id="edit-name" required>
                        </div>
                        <div class="input-group">
                            <label>Username</label>
                            <input type="text" id="edit-username" required>
                        </div>
                        <div class="input-group">
                            <label>Email</label>
                            <input type="email" id="edit-email" required>
                        </div>
                        <button type="submit" class="btn primary-btn auth-btn">Update Profile</button>
                    </form>
                </div>

                <div class="form-card">
                    <h2>Change Password</h2>
                    <form id="change-password-form">
                        <div class="input-group">
                            <label>Current Password</label>
                            <input type="password" id="current-password" required>
                        </div>
                        <div class="input-group">
                            <label>New Password</label>
                            <input type="password" id="new-password" required>
                        </div>
                        <div class="input-group">
                            <label>Confirm New Password</label>
                            <input type="password" id="confirm-password" required>
                        </div>
                        <button type="submit" class="btn primary-btn auth-btn">Change Password</button>
                    </form>
                </div>
            </div>
        </section>

        <section id="saved-tab" class="profile-content hide">
            <h2 style="margin-bottom: 2rem;">Your Saved Articles</h2>
            <div id="saved-news-grid" class="news-grid">
                <!-- Articles dynamically populated -->
            </div>
        </section>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/profile.js"></script>
</body>

</html>
